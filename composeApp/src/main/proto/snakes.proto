syntax = "proto2";
package snakes;
option java_package = "org.example.protocol";
option java_outer_classname = "SnakesProto";

// Роль узла в топологии связей узлов в пределах игры
enum NodeRole {
  NORMAL = 0; // Обычный узел, лист в топологии "звезда"
  MASTER = 1; // Главный узел, центр в топологии "звезда"
  DEPUTY = 2; // Заместитель главного узла
  VIEWER = 3; // Наблюдатель, похож на NORMAL, но не имеет змеи в статусе ALIVE, только получает обновления статуса
}

// Тип игрока
enum PlayerType {
  HUMAN = 0; // Живой пользователь
  ROBOT = 1; // Робот, управляет своей змеёй с помощью алгоритма
}

// Игрок
message GamePlayer {
  required string name = 1;
  required int32 id = 2;
  optional string ip_address = 3;
  optional int32 port = 4;
  required NodeRole role = 5;
  optional PlayerType type = 6 [default = HUMAN];
  required int32 score = 7;
}

/* Параметры идущей игры (не должны меняться в процессе игры) */
message GameConfig {
  optional int32 width = 1 [default = 40];
  optional int32 height = 2 [default = 30];
  optional int32 food_static = 3 [default = 1];
  optional int32 food_per_player = 4 [default = 1];        // ← ДОБАВЛЕНО
  optional int32 state_delay_ms = 5 [default = 1000];
  optional float dead_food_prob = 6 [default = 0.1];        // ← ДОБАВЛЕНО
  optional int32 ping_delay_ms = 7 [default = 1000];        // ← ДОБАВЛЕНО
  optional int32 node_timeout_ms = 8 [default = 3000];      // ← ДОБАВЛЕНО
}

/* Игроки конкретной игры */
message GamePlayers {
  repeated GamePlayer players = 1;
}

enum Direction {
  UP = 1;
  DOWN = 2;
  LEFT = 3;
  RIGHT = 4;
}

/* Текущее состояние игрового поля */
message GameState {
  message Coord {
    optional sint32 x = 1 [default = 0];
    optional sint32 y = 2 [default = 0];
  }

  message Snake {
    enum SnakeState {
      ALIVE = 0;
      ZOMBIE = 1;
    }
    required int32 player_id = 1;
    repeated Coord points = 2;
    required SnakeState state = 3 [default = ALIVE];
    required Direction head_direction = 4;
  }

  required int32 state_order = 1;
  repeated Snake snakes = 2;
  repeated Coord foods = 3;
  required GamePlayers players = 4;
}

message GameAnnouncement {
  required GamePlayers players = 1;
  required GameConfig config = 2;
  optional bool can_join = 3 [default = true];
  required string game_name = 4;
}

// Общий формат любого UDP-сообщения
message GameMessage {
  message PingMsg {
  }

  message SteerMsg {
    required Direction direction = 1;
  }

  message AckMsg {
  }

  message StateMsg {
    required GameState state = 1;
  }

  message AnnouncementMsg {
    repeated GameAnnouncement games = 1;
  }

  message DiscoverMsg {
  }

  message JoinMsg {
    optional PlayerType player_type = 1 [default = HUMAN];
    required string player_name = 3;
    required string game_name = 4;
    required NodeRole requested_role = 5;
  }

  message ErrorMsg {
    required string error_message = 1;
  }

  message RoleChangeMsg {
    optional NodeRole sender_role = 1;
    optional NodeRole receiver_role = 2;
  }

  required int64 msg_seq = 1;
  optional int32 sender_id = 10;
  optional int32 receiver_id = 11;

  oneof Type {
    PingMsg ping = 2;
    SteerMsg steer = 3;
    AckMsg ack = 4;
    StateMsg state = 5;
    AnnouncementMsg announcement = 6;
    JoinMsg join = 7;
    ErrorMsg error = 8;
    RoleChangeMsg role_change = 9;
    DiscoverMsg discover = 12;
  }
}
